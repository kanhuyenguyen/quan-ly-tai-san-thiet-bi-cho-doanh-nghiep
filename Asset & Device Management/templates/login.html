<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Asset & Device Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b2b3b 0%, #1a4a5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            display: flex;
            width: 950px;
            max-width: 95%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, #1e6f5c, #0e5a49);
            padding: 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-banner h1 {
            font-size: 55px;
            margin-bottom: 20px;
        }

        .login-banner .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
            font-size: 20px;
        }

        .login-form {
            flex: 1;
            padding: 50px 40px;
            background: white;
        }

        .login-form h2 {
            font-size: 28px;
            color: #1e2a3a;
            margin-bottom: 8px;
        }

        .login-form .sub {
            color: #5e6f8d;
            margin-bottom: 30px;
            border-left: 3px solid #1e6f5c;
            padding-left: 12px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1e2a3a;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cfdfe9;
            border-radius: 16px;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1e6f5c;
            box-shadow: 0 0 0 3px rgba(30, 111, 92, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #5e6f8d;
            cursor: pointer;
        }

        .btn-login {
            background: #1e6f5c;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:hover {
            background: #0e5a49;
            transform: translateY(-2px);
        }

        .error-message {
            background: #fee2e2;
            color: #c62828;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .role-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 8px;
        }

        .role-tag.admin {
            background: #ff9800;
            color: white;
        }

        .role-tag.employee {
            background: #4caf50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <h1> Asset & Device
                <br/> Management</h1>
            <div class="feature">- Quản lý tài sản thông minh</div>
            <div class="feature">- Theo dõi tình trạng thiết bị</div>
            <div class="feature">- Báo cáo & yêu cầu nhanh chóng</div>
        </div>
        <div class="login-form">
            <h2>Đăng nhập</h2>
            <div class="sub">Nhập thông tin để truy cập hệ thống</div>
            
            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
            
            <form method="POST">
                <div class="input-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" placeholder="VD: employee1 hoặc admin" required autofocus value="{{ username if username else '' }}">
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="••••••" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="isAdmin" name="is_admin" value="1">
                    <label for="isAdmin"> Đăng nhập với tư cách Quản trị viên (Admin)</label>
                </div>
                <button type="submit" class="btn-login"> Đăng nhập</button>
            </form>
            
        </div>
    </div>
</body>
</html>
