{% extends "Admin/layout.html" %}

{% block title %}Admin - Quản lý người dùng{% endblock %}

{% block content %}
<style>
    .filter-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 15px;
    }
    .search-box {
        padding: 8px 14px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        width: 280px;
        font-size: 14px;
    }
    .btn-add {
        background: #1a3c34;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
    }
    .btn-add:hover {
        background: #2a6b5c;
    }
    .btn-edit {
        background: #e2e8f0;
        color: #2d3748;
        border: none;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        margin-right: 5px;
    }
    .btn-delete {
        background: #fed7d7;
        color: #742a2a;
        border: none;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    }
    .user-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        margin-bottom: 16px;
        overflow: hidden;
    }
    .user-header {
        background: #f9fafb;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #e2e8f0;
        flex-wrap: wrap;
        gap: 10px;
    }
    .user-name {
        font-weight: 600;
        color: #1a3c34;
        font-size: 16px;
    }
    .user-role {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
    }
    .user-role.admin {
        background: #fed7d7;
        color: #742a2a;
    }
    .user-role.employee {
        background: #c6f6d5;
        color: #22543d;
    }
    .user-body {
        padding: 16px 20px;
    }
    .user-info {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        font-size: 14px;
    }
    .info-item {
        background: #f9fafb;
        padding: 8px 12px;
        border-radius: 8px;
    }
    .info-label {
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 4px;
        font-size: 12px;
    }
    .info-value {
        color: #2d3748;
    }
    .user-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 12px;
    }
    .pagination {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 24px;
    }
    .page-btn {
        padding: 6px 12px;
        border: 1px solid #cbd5e0;
        background: white;
        border-radius: 6px;
        cursor: pointer;
    }
    .page-btn.active {
        background: #1a3c34;
        color: white;
        border-color: #1a3c34;
    }
    .empty-message {
        text-align: center;
        padding: 60px;
        color: #718096;
    }
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .modal.show {
        display: flex;
    }
    .modal-content {
        background: white;
        border-radius: 12px;
        padding: 24px;
        width: 500px;
        max-width: 90%;
    }
    .modal-content h3 {
        color: #1a3c34;
        margin-bottom: 20px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        font-size: 14px;
        color: #4a5568;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: 14px;
    }
    .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 20px;
    }
    .btn-cancel {
        background: #e2e8f0;
        color: #4a5568;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
    }
    .btn-save {
        background: #1a3c34;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
    }
</style>

<div class="card">
    <div class="card-title">Quản lý người dùng</div>
    
    <div class="filter-bar">
        <input type="text" id="searchUser" class="search-box" placeholder="Tìm kiếm theo tên hoặc tên đăng nhập...">
        <button id="addUserBtn" class="btn-add">+ Thêm người dùng</button>
    </div>
    
    <div id="usersList">
        <div style="text-align: center; padding: 40px;">Đang tải dữ liệu...</div>
    </div>
    
    <div class="pagination" id="pagination"></div>
</div>

<!-- Modal thêm/sửa người dùng -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Thêm người dùng</h3>
        <input type="hidden" id="userId">
        
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập">
        </div>
        
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            <small style="color: #718096; font-size: 12px;">Để trống nếu không muốn đổi mật khẩu khi sửa</small>
        </div>
        
        <div class="form-group">
            <label>Họ tên</label>
            <input type="text" id="fullname" placeholder="Nhập họ tên">
        </div>
        
        <div class="form-group">
            <label>Phòng ban</label>
            <input type="text" id="department" placeholder="Nhập phòng ban">
        </div>
        
        <div class="form-group">
            <label>Vai trò</label>
            <select id="role">
                <option value="Employee">Nhân viên</option>
                <option value="Admin">Quản trị viên</option>
            </select>
        </div>
        
        <div class="modal-buttons">
            <button id="closeModalBtn" class="btn-cancel">Hủy</button>
            <button id="saveUserBtn" class="btn-save">Lưu</button>
        </div>
    </div>
</div>

<script>
    let allUsers = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    // ========== LOAD NGƯỜI DÙNG ==========
    async function loadUsers() {
        try {
            const res = await fetch('/api/admin/users');
            allUsers = await res.json();
            renderUsers();
        } catch (error) {
            console.error('Lỗi:', error);
            document.getElementById('usersList').innerHTML = '<div class="empty-message">Lỗi tải dữ liệu</div>';
        }
    }

    function renderUsers() {
        const search = document.getElementById('searchUser').value.toLowerCase();
        
        let filtered = allUsers.filter(u => {
            return u.fullname.toLowerCase().includes(search) || 
                   u.username.toLowerCase().includes(search) ||
                   (u.department && u.department.toLowerCase().includes(search));
        });
        
        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageUsers = filtered.slice(start, end);
        
        const container = document.getElementById('usersList');
        if (pageUsers.length === 0) {
            container.innerHTML = '<div class="empty-message">Không có người dùng nào</div>';
        } else {
            let html = '';
            for (let u of pageUsers) {
                let roleClass = u.role === 'Admin' ? 'admin' : 'employee';
                let roleText = u.role === 'Admin' ? 'Quản trị viên' : 'Nhân viên';
                
                html += `
                    <div class="user-card">
                        <div class="user-header">
                            <div>
                                <span class="user-name">${u.fullname}</span>
                                <span class="user-role ${roleClass}">${roleText}</span>
                            </div>
                            <div style="font-size: 13px; color: #718096;">
                                ${u.username}
                            </div>
                        </div>
                        <div class="user-body">
                            <div class="user-info">
                                <div class="info-item">
                                    <div class="info-label">Tên đăng nhập</div>
                                    <div class="info-value">${u.username}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Phòng ban</div>
                                    <div class="info-value">${u.department || '---'}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">ID</div>
                                    <div class="info-value">#${u.id}</div>
                                </div>
                            </div>
                            <div class="user-actions">
                                <button class="btn-edit" onclick="editUser(${u.id})">Sửa</button>
                                <button class="btn-delete" onclick="deleteUser(${u.id})">Xóa</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        renderPagination(totalPages);
    }
    
    function renderPagination(totalPages) {
        const pagination = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }
        
        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        pagination.innerHTML = html;
    }
    
    window.goToPage = (page) => {
        currentPage = page;
        renderUsers();
    };
    
    // ========== THÊM/SỬA NGƯỜI DÙNG ==========
    const userModal = document.getElementById('userModal');
    let isEditMode = false;
    
    document.getElementById('addUserBtn').onclick = () => {
        isEditMode = false;
        document.getElementById('modalTitle').innerText = 'Thêm người dùng';
        document.getElementById('userId').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('fullname').value = '';
        document.getElementById('department').value = '';
        document.getElementById('role').value = 'Employee';
        userModal.classList.add('show');
    };
    
    window.editUser = (id) => {
        const user = allUsers.find(u => u.id === id);
        if (user) {
            isEditMode = true;
            document.getElementById('modalTitle').innerText = 'Sửa người dùng';
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('password').value = '';
            document.getElementById('fullname').value = user.fullname;
            document.getElementById('department').value = user.department || '';
            document.getElementById('role').value = user.role;
            userModal.classList.add('show');
        }
    };
    
    document.getElementById('saveUserBtn').onclick = async () => {
        const id = document.getElementById('userId').value;
        const data = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            fullname: document.getElementById('fullname').value,
            department: document.getElementById('department').value,
            role: document.getElementById('role').value
        };
        
        if (!data.username) {
            alert('Vui lòng nhập tên đăng nhập');
            return;
        }
        if (!data.fullname) {
            alert('Vui lòng nhập họ tên');
            return;
        }
        
        const url = id ? `/api/admin/users/${id}` : '/api/admin/users';
        const method = id ? 'PUT' : 'POST';
        
        try {
            const res = await fetch(url, { 
                method: method, 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(data) 
            });
            const result = await res.json();
            if (result.success) {
                alert(id ? 'Cập nhật thành công!' : 'Thêm thành công!');
                userModal.classList.remove('show');
                loadUsers();
            } else {
                alert('Lỗi: ' + result.error);
            }
        } catch (error) {
            alert('Lỗi: ' + error.message);
        }
    };
    
    window.deleteUser = async (id) => {
        if (confirm('Bạn có chắc muốn xóa người dùng này?')) {
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.success) {
                    alert('Xóa thành công!');
                    loadUsers();
                } else {
                    alert('Lỗi: ' + result.error);
                }
            } catch (error) {
                alert('Lỗi: ' + error.message);
            }
        }
    };
    
    // Đóng modal
    document.getElementById('closeModalBtn').onclick = () => userModal.classList.remove('show');
    window.onclick = (e) => {
        if (e.target === userModal) userModal.classList.remove('show');
    };
    
    // Tìm kiếm
    document.getElementById('searchUser').onkeyup = () => {
        currentPage = 1;
        renderUsers();
    };
    
    // Khởi tạo
    loadUsers();
</script>
{% endblock %}
